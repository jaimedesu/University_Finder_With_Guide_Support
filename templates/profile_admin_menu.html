<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - University Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <header>
        <div class="header-container">
            <div class="logo-section"><h1>UNIVERSITY FINDER</h1></div>
            <nav><a href="{{ url_for('logout') }}">LOGOUT</a></nav>
        </div>
    </header>

    <div class="profile-page-wrapper">
        <div class="profile-card">
            <div class="admin-search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search user...">
            </div>
            <div class="user-list">
                
                {% for user in users %}
                <a href="{{ url_for('admin_view_user', user_id=user.id) }}" class="user-item">
                    {{ user.username }} <i class="fa-solid fa-gear"></i>
                </a>
                {% else %}
                <p style="text-align: center; padding: 10px;">No users found.</p>
                {% endfor %}

            </div>
        </div>
    </div>
</body>
</html>
