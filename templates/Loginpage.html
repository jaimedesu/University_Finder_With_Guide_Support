<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - University Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page-layout">

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo-section">
                <h1>UNIVERSITY FINDER</h1>
                <p>Discover the top and best universities here in the Philippines!</p>
            </div>
            <nav>
                <a href="{{ url_for('home') }}">HOME</a> | <a href="#">ABOUT US</a>
            </nav>
        </div>
    </header>

        <!-- Login form -->
        <div class="login-wrapper">
        <div class="login-card">
            <h2>LOGIN</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                                <div class="flash-message">
                  {% for message in messages %}
                    <p>{{ message }}</p>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" name="username" placeholder="Enter username..." required>
                </div>
                
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" name="password" placeholder="Enter password..." required>
                </div>
                
                <div class="login-button-row">
                    <button type="submit" class="btn-sign-in">SIGN IN</button>
                    <button type="button" class="btn-register" onclick="window.location.href='{{ url_for('register') }}'">REGISTER</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
