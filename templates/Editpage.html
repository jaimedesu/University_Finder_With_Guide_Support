<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ uni.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-center">

    <!-- Edit university form -->
    <div class="filters-card edit-card">
        <h2 class="edit-title">Editing: {{ uni.name }}</h2>
        
        <form action="{{ url_for('edit_university', uni_id=uni.id) }}" method="POST" class="form-stack">
            <label class="label-basic">Name:</label>
            <input class="input-basic" type="text" name="name" value="{{ uni.name }}" required>
            
            <label class="label-basic">Location:</label>
            <input class="input-basic" type="text" name="location" value="{{ uni.location }}" required>
            
            <label class="label-basic">Tuition:</label>
            <input class="input-basic" type="text" name="tuition" value="{{ uni.tuition }}" required>
            
            <label class="label-basic">Acceptance Rate:</label>
            <input class="input-basic" type="text" name="acceptance_rate" value="{{ uni.acceptance_rate }}" required>
            
            <label class="label-basic">Programs:</label>
            <input class="input-basic" type="text" name="programs" value="{{ uni.programs }}" required>
            
            <label class="label-basic">Image URL:</label>
            <input class="input-basic" type="url" name="image_url" value="{{ uni.image_url }}" required>
            
            <button type="submit" class="btn-view-details btn-warning">Save Updates</button>
            <a href="{{ url_for('dashboard') }}" class="link-muted">Cancel</a>
        </form>
    </div>

</body>
</html>
