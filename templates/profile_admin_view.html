<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="profile-page-wrapper">
        <div class="profile-card">
            <div class="profile-header">
                <h2>PROFILE NO#:</h2>
                <a href="profile_admin_menu.html" class="back-circle-btn"><i class="fa-solid fa-arrow-left"></i></a>
            </div>
            <form>
                <div class="profile-input-group">
                    <label>NAME:</label>
                    <input type="text" placeholder="Enter name...">
                </div>
                <div class="profile-input-group">
                    <label>EMAIL:</label>
                    <input type="email" placeholder="Enter email...">
                </div>
                <div class="profile-input-group">
                    <label>AGE:</label>
                    <input type="text" placeholder="Enter age...">
                </div>
                <div class="profile-actions">
                    <button type="button" class="btn-cyan">Change Email</button>
                    <button type="button" class="btn-red">Reset Password</button>
                </div>
                <button type="button" class="btn-delete">Delete User <i class="fa-solid fa-trash-can"></i></button>
            </form>
        </div>
    </div>
</body>
</html>
